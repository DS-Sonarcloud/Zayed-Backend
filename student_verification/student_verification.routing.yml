student_verification.datasource_add:
  path: '/admin/config/student/datasource/add'
  defaults:
    _form: '\Drupal\student_verification\Form\DataSourceAddForm'
    _title: 'Add Data Source'
  requirements:
    _permission: 'administer site configuration'

student_verification.datasource_list:
  path: '/admin/config/student/datasource'
  defaults:
    _controller: '\Drupal\student_verification\Controller\DataSourceController::list'
    _title: 'Data Sources'
  requirements:
    _permission: 'administer site configuration'

student_verification.datasource_delete:
  path: '/admin/config/student/datasource/{id}/delete'
  defaults:
    _form: '\Drupal\student_verification\Form\DataSourceDeleteForm'
    _title: 'Delete Data Source'
  requirements:
    _permission: 'administer site configuration'

student_verification.upload:
  path: '/admin/config/student/upload'
  defaults:
    _form: '\Drupal\student_verification\Form\StudentUploadForm'
    _title: 'Upload Students CSV'
  requirements:
    _permission: 'administer student verification'

student_verification.list:
  path: '/admin/config/student/list'
  defaults:
    _controller: '\Drupal\student_verification\Controller\StudentListController::list'
    _title: 'Student Records'
  requirements:
    _permission: 'administer student verification'

student_verification.add:
  path: '/admin/config/student/add'
  defaults:
    _form: '\Drupal\student_verification\Form\StudentCrudForm'
    _title: 'Add Student'
  requirements:
    _permission: 'administer student verification'

student_verification.edit:
  path: '/admin/config/student/{id}/edit'
  defaults:
    _form: '\Drupal\student_verification\Form\StudentCrudForm'
    _title: 'Edit Student'
  requirements:
    _permission: 'administer student verification'

student_verification.delete:
  path: '/admin/config/student/{id}/delete'
  defaults:
    _form: '\Drupal\student_verification\Form\StudentDeleteForm'
    _title: 'Delete Student'
  requirements:
    _permission: 'administer student verification'

student_verification.form:
  path: '/admin/structure/webform/manage/{webform}/settings/custom'
  defaults:
    _form: '\Drupal\student_verification\Form\CustomWebformSettingsForm'
    _title: 'Custom Setting'
  requirements:
    _permission: 'administer webform'