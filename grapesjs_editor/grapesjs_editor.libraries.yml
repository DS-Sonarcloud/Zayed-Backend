grapesjs:
  remote: https://github.com/artf/grapesjs
  version: 0.22.14
  license:
    name: BSD 3-clause
    url: https://github.com/artf/grapesjs/blob/v0.22.14/LICENSE
    gpl-compatible: true
  js:
    https://unpkg.com/grapesjs@0.22.14/dist/grapes.min.js: { type: external }
    https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js:
      { type: external }
  css:
    base:
      https://unpkg.com/grapesjs@0.22.14/dist/css/grapes.min.css:
        { type: external }

newsletter_preset:
  remote: https://github.com/artf/grapesjs-preset-newsletter
  version: 1.0.2
  license:
    name: BSD 3-clause
    url: https://github.com/artf/grapesjs-preset-newsletter/blob/master/LICENSE
    gpl-compatible: true
  js:
    libraries/js/plugins/grapesjs-preset-newsletter/grapesjs-preset-newsletter.min.js:
      { minified: true }
  dependencies:
    - grapesjs_editor/grapesjs

mjml_preset:
  remote: https://github.com/GrapesJS/mjml
  version: 1.0.7
  license:
    name: BSD 3-clause
    url: https://github.com/GrapesJS/mjml/blob/master/LICENSE
    gpl-compatible: true
  js:
    https://unpkg.com/grapesjs-mjml@1.0.7/dist/index.js: { type: external, minified: true }
  dependencies:
    - grapesjs_editor/grapesjs

editor:
  version: VERSION
  css:
    base:
      libraries/css/editor.css: {}
  js:
    libraries/js/drupal-grapesjs-editor.js: {}
  dependencies:
    - core/jquery
    - core/drupal
    - core/drupalSettings
    - core/drupal.debounce
    - core/drupal.displace
    - editor/drupal.editor
    - grapesjs_editor/grapesjs

drupal-storage:
  version: VERSION
