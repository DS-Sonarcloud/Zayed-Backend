services:
  zu_config_builder.commands:
    class: \Drupal\zu_config_builder\Commands\ConfigBuilderCommands
    arguments:
      - '@entity_type.manager'
      - '@config.storage'
      - '@config.factory'
      - '@module_handler'
      - '@module_installer'
      - '@config.manager'
      - '@config.typed'
      - '@event_dispatcher'
      - '@lock'
    tags:
      - { name: drush.command }
