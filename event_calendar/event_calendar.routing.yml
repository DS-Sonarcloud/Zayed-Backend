event_calendar.admin_events:
  path: '/admin/events-dashboard'
  defaults:
    _controller: '\Drupal\event_calendar\Controller\EventDashboardController::dashboard'
    _title: 'Events Dashboard'
  requirements:
    _permission: 'access content'

event_calendar.ics_export:
  path: '/event/{node}/calendar.ics'
  defaults:
    _controller: '\Drupal\event_calendar\Controller\EventCalendarExportController::generateIcs'
    _title: 'Download .ICS'
  requirements:
    _entity_access: 'node.view'
    node: \d+

event_calendar.node_view_count:
  path: '/api/node-view-count/{node}'
  defaults:
    _controller: '\Drupal\event_calendar\Controller\EventNodeViewCountController::incrementCount'
    _format: 'json'
  requirements:
    _permission: 'access content'
    node: \d+

event_calendar.manual_notification:
  path: '/admin/content/manual-notification'
  defaults:
    _form: '\Drupal\event_calendar\Form\EventNotificationForm'
    _title: 'Manual Notification'
  requirements:
    _permission: 'administer site configuration'

event_calendar.firebase_settings:
  path: '/admin/config/event-calendar/firebase-settings'
  defaults:
    _form: '\Drupal\event_calendar\Form\FirebaseSettingsForm'
    _title: 'Firebase Settings'
  requirements:
    _permission: 'administer site configuration'

event_calendar.notification_status:
  path: '/admin/event-notification/status/{batch_id}'
  defaults:
    _controller: '\Drupal\event_calendar\Controller\EventNotificationStatusController::getStatus'
  requirements:
    _permission: 'manage event dashboard'
    batch_id: \d+

event_calendar.notification_process:
  path: '/admin/event-notification/process/{batch_id}'
  defaults:
    _controller: '\Drupal\event_calendar\Controller\EventNotificationStatusController::processBatch'
  requirements:
    _permission: 'manage event dashboard'
    batch_id: \d+
    _method: 'GET|POST'

event_calendar.event_bookmarks:
  path: '/admin/people/bookmarks/{nid}'
  defaults:
    _form: '\Drupal\event_calendar\Form\EventBookmarksForm'
    _title: 'Event Bookmarks'
  requirements:
    _permission: 'view event bookmarks'
  options:
    parameters:
      nid:
        type: integer

event_calendar.event_bookmarks_csv:
  path: '/admin/people/bookmarks/{nid}/csv'
  defaults:
    _controller: '\Drupal\event_calendar\Controller\EventBookmarksController::downloadCsv'
    _title: 'Download Bookmarks CSV'
  requirements:
    _permission: 'export event bookmarks csv'
  options:
    parameters:
      nid:
        type: integer

event_calendar.event_subscribers:
  path: '/admin/people/subscribers/{tid}'
  defaults:
    _form: '\Drupal\event_calendar\Form\EventSubscribersForm'
    _title: 'Event Type Subscribers'
  requirements:
    _permission: 'view event subscribers'
  options:
    parameters:
      tid:
        type: integer

event_calendar.event_subscribers_csv:
  path: '/admin/people/subscribers/{tid}/csv'
  defaults:
    _controller: '\Drupal\event_calendar\Controller\EventSubscribersController::downloadCsv'
    _title: 'Download Subscribers CSV'
  requirements:
    _permission: 'export event subscribers csv'
  options:
    parameters:
      tid:
        type: integer
