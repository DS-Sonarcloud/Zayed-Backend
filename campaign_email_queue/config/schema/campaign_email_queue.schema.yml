campaign_email_queue.settings:
  type: config_object
  label: 'Campaign email queue settings'
  mapping:
    cron_batch_size:
      type: integer
      label: 'Emails per background batch'
    cron_max_batches_per_campaign:
      type: integer
      label: 'Max batches per cron item (0 = unlimited within time)'
    cron_background_seconds:
      type: integer
      label: 'Seconds to drain send queue per cron run'
    enqueue_chunk_size:
      type: integer
      label: 'Recipients enqueued per DB chunk'
    log_insert_chunk_size:
      type: integer
      label: 'Log rows inserted per chunk'
    claim_chunk_size:
      type: integer
      label: 'Queue items claimed per sub-batch when sending'
    max_send_attempts:
      type: integer
      label: 'Reserved for future retry policy'
    shutdown_drain_seconds:
      type: integer
      label: 'Seconds to send after Process click'
    dashboard_poll_interval_ms:
      type: integer
      label: 'Dashboard poll interval in ms'
    auto_start_on_save:
      type: boolean
      label: 'Start sending when campaign queue is built'
    keepalive_drain_seconds:
      type: integer
      label: 'Seconds to send per keep-alive tick'
    keepalive_min_interval:
      type: integer
      label: 'Minimum seconds between keep-alive drains'
    poll_drain_min_interval:
      type: integer
      label: 'Minimum seconds between poll-driven drains while dashboard is open'
    live_log_flush_size:
      type: integer
      label: 'Write email log updates every N sends for live dashboard counts'
    admin_keepalive_interval_ms:
      type: integer
      label: 'Admin keep-alive ping interval in ms'
