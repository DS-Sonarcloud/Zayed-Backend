campaign_email_queue.dashboard:
  path: "/admin/content/campaign-email-queues"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignDashboardController::overview'
    _title: "Campaign Email Queues"
  requirements:
    _permission: "access campaign email queue dashboard"

campaign_email_queue.queue_items:
  path: "/admin/content/campaign-email-queues/items"
  defaults:
    _form: '\Drupal\campaign_email_queue\Form\CampaignQueueItemsForm'
    _title: "Campaign Queue Items"
  requirements:
    _permission: "manage campaign email queues"

campaign_email_queue.control:
  path: "/admin/content/campaign-email-queues/{node}/control"
  defaults:
    _form: '\Drupal\campaign_email_queue\Form\CampaignQueueControlForm'
    _title: "Control Campaign Queue"
  requirements:
    _permission: "access campaign email queue dashboard"
    node: \d+

campaign_email_queue.process:
  path: "/admin/campaign-email-queue/{node}/process"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignQueueController::processQueue'
    _title: "Process Queue"
  requirements:
    _permission: "access campaign email queue dashboard"
    node: \d+

campaign_email_queue.ajax_process:
  path: "/admin/campaign-email-queue/{node}/ajax-process"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignQueueController::ajaxProcessQueue'
  requirements:
    _permission: "access campaign email queue dashboard"
    node: \d+

campaign_email_queue.ajax_status:
  path: "/admin/campaign-email-queue/{node}/ajax-status"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignQueueController::ajaxStatus'
  requirements:
    _permission: "access campaign email queue dashboard"
    node: \d+

campaign_email_queue.ajax_live_status:
  path: "/admin/content/campaign-email-queues/live-status"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignDashboardController::ajaxLiveStatus'
  requirements:
    _permission: "access campaign email queue dashboard"
  methods: [GET, POST]

campaign_email_queue.keepalive:
  path: "/admin/content/campaign-email-queues/keepalive"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignKeepAliveController::tick'
  requirements:
    _permission: "access campaign email queue dashboard"
  methods: [GET]

campaign_email_queue.clear:
  path: "/admin/campaign-email-queue/{node}/clear"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignQueueController::clearQueue'
    _title: "Clear Queue"
  requirements:
    _permission: "access campaign email queue dashboard"
    node: \d+

campaign_email_queue.ajax_clear:
  path: "/admin/campaign-email-queue/{node}/ajax-clear"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignQueueController::ajaxClearQueue'
  requirements:
    _permission: "access campaign email queue dashboard"
    node: \d+

campaign_email_queue.pause_toggle:
  path: "/admin/campaign-email-queue/{node}/pause-toggle"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignQueueController::togglePause'
    _title: "Toggle Pause"
  requirements:
    _permission: "access campaign email queue dashboard"
    node: \d+

campaign_email_queue.rerun:
  path: "/admin/campaign-email-queue/{node}/rerun"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignQueueController::rerunCampaign'
    _title: "Re-run Campaign"
  requirements:
    _permission: "access campaign email queue dashboard"
    node: \d+

campaign_email_queue.ajax_rerun:
  path: "/admin/campaign-email-queue/{node}/ajax-rerun"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignQueueController::ajaxRerunCampaign'
  requirements:
    _permission: "access campaign email queue dashboard"
    node: \d+

campaign_email_queue.details:
  path: "/admin/campaign-email-queue/{node}/details"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignDashboardController::details'
    _title: "Campaign Details"
  requirements:
    _permission: "access campaign email queue dashboard"
    node: \d+

campaign_email_queue.run_logs:
  path: "/admin/campaign-email-queue/{node}/run/{run_id}/logs"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignDashboardController::runLogs'
    _title: "Campaign Run Logs"
  requirements:
    _permission: "access campaign email queue dashboard"
    node: \d+
    run_id: \d+

campaign_email_queue.api.status:
  path: "/api/campaign-email-queue/{campaign_id}/status"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignApiController::getCampaignStatus'
  requirements:
    _permission: "access campaign email queue dashboard"
    campaign_id: \d+
  methods: [GET]

campaign_email_queue.api.all_status:
  path: "/api/campaign-email-queue/all/status"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignApiController::getAllCampaignsStatus'
  requirements:
    _permission: "access campaign email queue dashboard"
  methods: [GET]

campaign_email_queue.api.logs:
  path: "/api/campaign-email-queue/{campaign_id}/logs"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignApiController::getCampaignLogs'
  requirements:
    _permission: "access campaign email queue dashboard"
    campaign_id: \d+
  methods: [GET]

campaign_email_queue.api.statistics:
  path: "/api/campaign-email-queue/statistics"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignApiController::getAggregatedStatistics'
  requirements:
    _permission: "access campaign email queue dashboard"
  methods: [GET]

campaign_email_queue.test_cron:
  path: "/admin/campaign-email-queue/test-cron"
  defaults:
    _controller: '\Drupal\campaign_email_queue\Controller\CampaignDashboardController::testCron'
    _title: "Detailed Cron Diagnostic"
  requirements:
    _permission: "manage campaign email queues"
