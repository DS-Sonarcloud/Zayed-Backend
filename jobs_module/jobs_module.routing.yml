jobs_module.application_get:
  path: /api/secure/job-application/{job_id}
  defaults:
    _controller: '\Drupal\jobs_module\Controller\JobApplicationApiController::getApplication'
  requirements:
    _permission: 'access content'

jobs_module.application_submit:
  path: /api/secure/job-application/{job_id}/submit
  defaults:
    _controller: '\Drupal\jobs_module\Controller\JobApplicationApiController::submit'
  requirements:
    _permission: 'access content'

jobs_module.application_list:
  path: '/api/secure/job-applications-list'
  defaults:
    _controller: '\Drupal\jobs_module\Controller\JobApplicationApiController::JobApplicationList'
  requirements:
    _permission: 'access content'
