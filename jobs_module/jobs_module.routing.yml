jobs_module.list:
  path: '/admin/jobs/applications'
  defaults:
    _form: '\Drupal\jobs_module\Form\JobApplicationFilterForm'
    _title: 'Job Applications'
  requirements:
    _permission: 'view job applications'

jobs_module.edit:
  path: '/admin/content/job-applications/{id}/edit'
  defaults:
    _form: '\Drupal\jobs_module\Form\JobApplicationEditForm'
    _title: 'Edit Application'
  requirements:
    _custom_access: 'jobs_module.access_check:access'
  options:
    parameters:
      id:
        type: 'int'

jobs_module.delete:
  path: '/admin/structure/jobs/application/{id}/delete'
  defaults:
    _controller: '\Drupal\jobs_module\Controller\JobApplicationController::delete'
    _title: 'Delete application'
  requirements:
    _permission: 'delete job applications'
  options:
    _admin_route: TRUE

jobs_module.public_user_autocomplete:
  path: '/jobs/public-user-autocomplete'
  defaults:
    _controller: '\Drupal\jobs_module\Controller\PublicUserAutocompleteController::autocomplete'
  requirements:
    _permission: 'access content'


