custom_elastic_search.search:
  path: '/custom_elastic_search/search'
  defaults:
    _controller: '\Drupal\custom_elastic_search\Controller\SearchController::search'
    _title: 'Elastic Search AJAX'
  requirements:
    _permission: 'access content'
  methods: [GET]

custom_elastic_search.settings_form:
  path: '/admin/config/search/custom-elastic-search'
  defaults:
    _form: '\Drupal\custom_elastic_search\Form\ElasticSearchSettingsForm'
    _title: 'Elastic Search Settings'
  requirements:
    _permission: 'administer site configuration'

custom_elastic_search.advanced_search:
  path: '/elastic-advanced-search'
  defaults:
    _controller: '\Drupal\custom_elastic_search\Controller\ElasticAdvancedSearchController::advancedSearchPage'
    _title: 'Elastic Advanced Search'
  requirements:
    _permission: 'access content'

custom_elastic_search.ajax_search:
  path: '/elastic-advanced-search/ajax'
  defaults:
    _controller: '\Drupal\custom_elastic_search\Controller\ElasticAdvancedSearchController::ajaxSearch'
  requirements:
    _permission: 'access content'
  methods: [POST]

custom_elastic_search.track_click:
  path: '/elastic-advanced-search/click'
  defaults:
    _controller: '\Drupal\custom_elastic_search\Controller\ElasticAdvancedSearchController::trackClick'
  requirements:
    _permission: 'access content'
  methods: [POST]
