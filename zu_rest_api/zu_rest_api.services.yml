services:
  zu_rest_api.constant:
    class: Drupal\zu_rest_api\Service\ConstantService
    arguments:
      - "@http_client"
      - "@logger.channel.default"

  zu_rest_api.deploy_api_service:
    class: Drupal\zu_rest_api\Service\DeployApiService
    arguments:
      - "@http_client"
      - "@logger.channel.default"
      - "@zu_rest_api.constant"

  zu_rest_api.deployment_log:
    class: Drupal\zu_rest_api\Service\DeploymentLogService
    arguments:
      - "@database"
      - "@current_user"
      - "@logger.channel.default"

  zu_rest_api.jwt_request_subscriber:
    class: Drupal\zu_rest_api\EventSubscriber\JwtRequestSubscriber
    tags:
      - { name: event_subscriber }

  zu_rest_api.deploy_page:
    class: Drupal\zu_rest_api\Service\DeployPageService
    arguments:
      - "@http_client"
      - "@logger.factory"

  zu_rest_api.user_logout_subscriber:
    class: Drupal\zu_rest_api\EventSubscriber\UserLogoutSubscriber
    tags:
      - { name: event_subscriber }


  zu_rest_api.entity_query:
    class: Drupal\zu_rest_api\Service\EntityQueryService
    arguments:
      - "@entity_type.manager"
      - "@entity_field.manager"

  zu_rest_api.field_serializer:
    class: Drupal\zu_rest_api\Service\FieldSerializerService
    arguments:
      - "@entity_type.manager"
      - "@file_url_generator"
      - "@path_alias.manager"
      - "@zu_rest_api.constant"

  zu_rest_api.content_deploy_manager:
    class: Drupal\zu_rest_api\Service\ContentDeployManager
    arguments:
      - "@zu_rest_api.entity_query"
      - "@zu_rest_api.field_serializer"
      - "@zu_rest_api.deploy_api_service"
      - "@zu_rest_api.deployment_log"
      - "@zu_rest_api.constant"
      - "@config.factory"
      - !tagged_iterator { tag: "zu_rest_api.content_transformer" }
      - "@short_alias.repository"

  zu_rest_api.transformer.blog:
    class: Drupal\zu_rest_api\ContentTransformer\BlogTransformer
    arguments:
      - "@short_alias.repository"
      - "@zu_rest_api.constant"
      - "@entity_type.manager"
      - "@renderer"
    tags:
      - { name: "zu_rest_api.content_transformer" }

  zu_rest_api.transformer.news:
    class: Drupal\zu_rest_api\ContentTransformer\NewsTransformer
    arguments:
      - "@short_alias.repository"
      - "@zu_rest_api.constant"
      - "@entity_type.manager"
    tags:
      - { name: "zu_rest_api.content_transformer" }

  zu_rest_api.transformer.event:
    class: Drupal\zu_rest_api\ContentTransformer\EventTransformer
    arguments:
      - "@short_alias.repository"
      - "@zu_rest_api.constant"
      - "@entity_type.manager"
      - "@config.factory"
      - "@renderer"
      - "@entity_display.repository"
    tags:
      - { name: "zu_rest_api.content_transformer" }

  zu_rest_api.transformer.job:
    class: Drupal\zu_rest_api\ContentTransformer\JobTransformer
    arguments:
      - "@short_alias.repository"
      - "@zu_rest_api.constant"
    tags:
      - { name: "zu_rest_api.content_transformer" }

  zu_rest_api.transformer.forum:
    class: Drupal\zu_rest_api\ContentTransformer\ForumTransformer
    arguments:
      - "@path_alias.manager"
      - "@entity_type.manager"
      - '@date.formatter'
    tags:
      - { name: "zu_rest_api.content_transformer" }

  zu_rest_api.transformer.faculty:
    class: Drupal\zu_rest_api\ContentTransformer\FacultyTransformer
    arguments:
      - "@entity_type.manager"
    tags:
      - { name: "zu_rest_api.content_transformer" }

  zu_rest_api.transformer.college:
    class: Drupal\zu_rest_api\ContentTransformer\CollegeTransformer
    arguments:
      - "@entity_type.manager"
    tags:
      - { name: "zu_rest_api.content_transformer" }

  zu_rest_api.transformer.photo_gallery:
    class: Drupal\zu_rest_api\ContentTransformer\PhotoGalleryTransformer
    arguments:
      - "@zu_rest_api.constant"
      - "@entity_type.manager"
    tags:
      - { name: "zu_rest_api.content_transformer" }
