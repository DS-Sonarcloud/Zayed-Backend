services:
  zu_personalization.persona_resolver:
    class: Drupal\zu_personalization\Service\PersonaResolver
    arguments: ['@database']

  zu_personalization.context_resolver:
    class: Drupal\zu_personalization\Service\ContextResolver
    arguments: ['@database', '@language_manager', '@request_stack', '@cache.default']

  zu_personalization.rule_evaluator:
    class: Drupal\zu_personalization\Service\RuleEvaluator
    arguments: ['@database']

  zu_personalization.scoring_booster:
    class: Drupal\zu_personalization\Service\ScoringBooster
    arguments: ['@database', '@datetime.time']

  zu_personalization.profile_ingestor:
    class: Drupal\zu_personalization\Service\ProfileIngestor
    arguments: ['@database', '@datetime.time']
