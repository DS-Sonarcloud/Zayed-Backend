services:
  email_marketing.sender:
    class: Drupal\email_marketing\Service\EmailMarketingSender
    arguments:
      ["@renderer", "@plugin.manager.mail", "@logger.channel.email_marketing"]

  logger.channel.email_marketing:
    parent: "logger.channel_base"
    arguments: ["email_marketing"]

  email_marketing.service:
    class: Drupal\email_marketing\Service\EmailMarketingService
    arguments:
      [
        "@renderer",
        "@plugin.manager.mail",
        "@logger.channel.email_marketing",
        "@database",
      ]
