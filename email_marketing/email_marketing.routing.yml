#     _title: 'Define user groups'
#   requirements:
#     _permission: 'administer users'

email_marketing.unsubscribe:
  path: '/unsubscribe/{campaign_id}/{email}/{token}'
  defaults:
    _controller: '\Drupal\email_marketing\Controller\UnsubscribeController::unsubscribe'
    _title: 'Unsubscribe'
  requirements:
    _access: 'TRUE'
    email: '.+'
    token: '.+'

email_marketing.unsubscribe_api:
  path: '/api/v1/unsubscribe'
  defaults:
    _controller: '\Drupal\email_marketing\Controller\UnsubscribeController::unsubscribeApi'
  requirements:
    _access: 'TRUE'
  methods: [POST]

email_marketing.template_preview:
  path: '/admin/content/email-templates/{node}/preview'
  defaults:
    _controller: '\Drupal\email_marketing\Controller\EmailTemplatePreviewController::preview'
    _title: 'Email Template Preview'
  requirements:
    _permission: 'administer email marketing'
  options:
    parameters:
      node:
        type: entity:node

