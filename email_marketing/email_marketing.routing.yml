email_marketing.form:
  path: "/admin/marketing/email"
  defaults:
    _form: '\Drupal\email_marketing\Form\EmailMarketingForm'
    _title: "Email Marketing"
  requirements:
    _permission: "administer site configuration"

email_marketing.settings:
  path: "/admin/config/services/email-marketing"
  defaults:
    _form: '\Drupal\email_marketing\Form\SettingsForm'
    _title: "Email Marketing Settings"
  requirements:
    _permission: "administer site configuration"

email_marketing.sent_list:
  path: "/admin/content/email-marketing/sent"
  defaults:
    _controller: '\Drupal\email_marketing\Controller\EmailMarketingSentController::list'
    _title: "Sent Emails"
  requirements:
    _permission: "administer email marketing"

email_marketing.campaigns:
  path: '/admin/content/email-marketing/campaigns'
  defaults:
    _controller: '\Drupal\email_marketing\Controller\EmailMarketingCampaignController::list'
    _title: 'Email Campaigns'
  requirements:
    _permission: 'administer email marketing'

email_marketing.campaign_send:
  path: '/admin/content/email-marketing/campaigns/{campaign}/send'
  defaults:
    _controller: '\Drupal\email_marketing\Controller\EmailMarketingCampaignController::send'
    _title: 'Send Campaign'
  requirements:
    _permission: 'administer email marketing'

email_marketing.campaign_show:
  path: '/admin/content/email-marketing/campaigns/{campaign}/show'
  defaults:
    _controller: '\Drupal\email_marketing\Controller\EmailMarketingSentController::listByCampaign'
    _title: 'Sent Emails'
  requirements:
    _permission: 'administer email marketing'

