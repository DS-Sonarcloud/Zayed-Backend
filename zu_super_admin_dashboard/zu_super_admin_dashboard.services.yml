services:
  zu_super_admin_dashboard.theme_negotiator.content_dashboard:
    class: Drupal\zu_super_admin_dashboard\Theme\ContentDashboardAdminThemeNegotiator
    arguments:
      - '@current_user'
      - '@config.factory'
    tags:
      - { name: theme_negotiator, priority: -25 }

  zu_super_admin_dashboard.theme_negotiator.user_profile:
    class: Drupal\zu_super_admin_dashboard\Theme\UserProfileAdminThemeNegotiator
    arguments:
      - '@current_user'
      - '@config.factory'
      - '@entity_type.manager'
    tags:
      - { name: theme_negotiator, priority: -30 }

  zu_super_admin_dashboard.theme_negotiator.admin_content:
    class: Drupal\zu_super_admin_dashboard\Theme\AdminContentThemeNegotiator
    arguments:
      - '@current_user'
      - '@config.factory'
    tags:
      - { name: theme_negotiator, priority: 110 }

  zu_super_admin_dashboard.admin_links:
    class: Drupal\zu_super_admin_dashboard\Service\DashboardAdminLinkResolver
    arguments:
      - '@current_user'
      - '@module_handler'

  zu_super_admin_dashboard.erd_category_views:
    class: Drupal\zu_super_admin_dashboard\Service\ErdCategoryViewsBuilder
    arguments:
      - '@entity_type.manager'
      - '@database'
      - '@date.formatter'
      - '@zu_super_admin_dashboard.admin_links'

  zu_super_admin_dashboard.erd_data:
    class: Drupal\zu_super_admin_dashboard\Service\ErdDashboardDataService
    arguments:
      - '@entity_type.manager'
      - '@module_handler'
      - '@database'
      - '@zu_super_admin_dashboard.erd_category_views'
      - '@zu_super_admin_dashboard.admin_links'

  zu_super_admin_dashboard.visit_history:
    class: Drupal\zu_super_admin_dashboard\Service\AdminVisitHistoryService
    arguments:
      - '@state'
      - '@current_user'
      - '@date.formatter'

  zu_super_admin_dashboard.visit_subscriber:
    class: Drupal\zu_super_admin_dashboard\EventSubscriber\AdminVisitHistorySubscriber
    arguments:
      - '@current_user'
      - '@zu_super_admin_dashboard.visit_history'
      - '@current_route_match'
      - '@title_resolver'
    tags:
      - { name: event_subscriber }

  zu_super_admin_dashboard.builder:
    class: Drupal\zu_super_admin_dashboard\Service\SuperAdminDashboardBuilder
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@module_handler'
      - '@menu.link_tree'
      - '@plugin.manager.menu.link'
      - '@date.formatter'
      - '@current_user'
      - '@state'
      - '@zu_super_admin_dashboard.erd_data'
      - '@zu_super_admin_dashboard.admin_links'
