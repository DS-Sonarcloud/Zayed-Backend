services:
  zu_admin.sidebar_service:
    class: Drupal\zu_admin\Service\SidebarService
    arguments: ['@current_user', '@router.route_provider', '@current_route_match']

  zu_admin.notification_service:
    class: Drupal\zu_admin\Service\NotificationService
    arguments: ['@current_user', '@database']

  zu_admin.group_manager:
    class: Drupal\zu_admin\Service\GroupManagerService
    arguments: ['@database', '@entity_type.manager', '@current_user']

  zu_admin.audit_service:
    class: Drupal\zu_admin\Service\AuditService
    arguments: ['@database', '@current_user']
