zu_admin.dashboard:
  path: '/zu-admin/dashboard'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\DashboardController::dashboard'
    _title: 'Dashboard'
  requirements:
    _permission: 'access zu admin dashboard'

zu_admin.people.list:
  path: '/zu-admin/people'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\PeopleController::list'
    _title: 'People'
  requirements:
    _permission: 'administer users'

zu_admin.people.add_user:
  path: '/zu-admin/people/new_user'
  defaults:
    _form: '\Drupal\zu_admin\Form\AddUserForm'
    _title: 'Add User'
  requirements:
    _permission: 'administer users'

zu_admin.people.view_user:
  path: '/zu-admin/people/{uid}/view'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\PeopleController::viewUser'
    _title: 'View User'
  requirements:
    _permission: 'administer users'
    uid: \d+

zu_admin.people.workflows:
  path: '/zu-admin/people/{group_name}/workflows'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\WorkflowController::groupWorkflows'
    _title: 'Workflows'
  requirements:
    _permission: 'administer users'

zu_admin.people.edit_group:
  path: '/zu-admin/people/{group_name}/edit'
  defaults:
    _form: '\Drupal\zu_admin\Form\EditGroupForm'
    _title: 'Edit Group'
  requirements:
    _permission: 'administer users'

zu_admin.bulk_import:
  path: '/zu-admin/bulk-import'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\BulkImportController::index'
    _title: 'Bulk Import Data'
  requirements:
    _permission: 'access zu admin dashboard'

zu_admin.schema_viewer:
  path: '/zu-admin/schema-viewer'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\SchemaViewerController::index'
    _title: 'Schema Viewer'
  requirements:
    _permission: 'access zu admin dashboard'

zu_admin.audit_logs:
  path: '/zu-admin/audit-logs'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\AuditLogsController::index'
    _title: 'Audit Logs'
  requirements:
    _permission: 'access zu admin dashboard'

zu_admin.audit_logs.export:
  path: '/zu-admin/audit-logs/export'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\AuditLogsController::export'
    _title: 'Export Audit Logs'
  requirements:
    _permission: 'access zu admin dashboard'

zu_admin.system_monitoring:
  path: '/zu-admin/system-monitoring'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\SystemMonitoringController::index'
    _title: 'System Monitoring'
  requirements:
    _permission: 'access zu admin dashboard'

zu_admin.mls_integration:
  path: '/zu-admin/mls-integration'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\MlsIntegrationController::index'
    _title: 'MLS Integration'
  requirements:
    _permission: 'access zu admin dashboard'

zu_admin.notifications:
  path: '/zu-admin/notifications'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\NotificationsController::index'
    _title: 'Notifications'
  requirements:
    _permission: 'access zu admin dashboard'

zu_admin.ajax.groups:
  path: '/zu-admin/ajax/groups'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\AjaxController::getGroups'
  requirements:
    _permission: 'administer users'
    _csrf_token: 'TRUE'

zu_admin.ajax.roles:
  path: '/zu-admin/ajax/roles'
  defaults:
    _controller: '\Drupal\zu_admin\Controller\AjaxController::getRoles'
  requirements:
    _permission: 'administer users'
    _csrf_token: 'TRUE'
